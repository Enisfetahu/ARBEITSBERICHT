<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkett Haliti - Arbeitsbericht</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .btn-active:active { transform: scale(0.95); }
        .logo-font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; letter-spacing: -1px; }
        .parkett { color: #374151; }
        .haliti { color: #15803d; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #15803d; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-20">

    <div class="max-w-md mx-auto p-4">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-8 pt-4">
            <div class="text-3xl logo-font flex items-center gap-1 uppercase">
                <span class="parkett text-gray-700">parkett</span>
                <span class="haliti text-green-700">haliti</span>
            </div>
            <div class="flex gap-1 mt-1">
                <div class="w-8 h-1 bg-green-700 rounded-full"></div>
                <div class="w-16 h-1 bg-gray-700 rounded-full"></div>
                <div class="w-8 h-1 bg-green-700 rounded-full"></div>
            </div>
        </div>

        <!-- Header -->
        <header class="mb-6 flex justify-between items-center px-2">
            <div class="text-left">
                <h1 class="text-xl font-bold text-gray-800 uppercase tracking-wide">Arbeitsbericht</h1>
                <p id="live-clock" class="text-green-600 text-xs font-bold uppercase tracking-widest">Loding time...</p>
            </div>
            <button onclick="toggleHistory()" class="bg-white border border-gray-200 p-2 rounded-xl shadow-sm flex items-center gap-2 text-sm font-bold text-gray-700 btn-active">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Historie
            </button>
        </header>

        <!-- Form Section -->
        <div id="main-form">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3 tracking-wider text-center border-b pb-2">Mitarbeiter</h3>
                <input type="text" id="worker-name" placeholder="Vorname Nachname" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-500 outline-none">
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3 tracking-wider text-center border-b pb-2">Standort</h3>
                <div class="space-y-3">
                    <input type="text" id="project-address" placeholder="Strasse, Hausnummer, Ort" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-500 outline-none">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="project-floor" placeholder="z.B. 1. OG " class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-500 outline-none">
                        <select id="project-type" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-500 outline-none">
                            <option value="Rechts">Rechts</option>
                            <option value="Links">Links</option>
                            <option value=".">.</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="date" id="work-date" class="p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    <input type="time" id="work-time" class="p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div id="job-list" class="space-y-4"></div>
                <button onclick="addJobRow()" class="w-full mt-4 py-3 border-2 border-dashed border-green-300 text-green-700 rounded-xl font-bold flex items-center justify-center gap-2 btn-active">
                    + Weitere Arbeit
                </button>
            </div>

            <button onclick="saveToLocal()" class="w-full bg-green-700 text-white py-4 rounded-xl font-bold text-lg mb-3 btn-active uppercase">Bericht speichern</button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="generatePDF()" class="bg-gray-700 text-white py-4 rounded-xl font-bold btn-active uppercase text-sm">PDF Erstellen</button>
                <button onclick="sharePDF()" class="bg-green-600 text-white py-4 rounded-xl font-bold btn-active uppercase text-sm">Teilen</button>
            </div>
        </div>

        <!-- History Section -->
        <div id="history-section" class="hidden">
            <div class="bg-white rounded-2xl p-5 mb-4 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold uppercase text-gray-800">Historie</h2>
                    <button onclick="clearHistory()" class="text-xs text-red-500 underline uppercase font-bold">Löschen</button>
                </div>
                <div id="history-list" class="space-y-3 max-h-[60vh] overflow-y-auto custom-scroll pr-1"></div>
            </div>
            <button onclick="toggleHistory()" class="w-full bg-gray-200 py-3 rounded-xl font-bold btn-active">Zurück</button>
        </div>

        <div id="status-msg" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-sm opacity-0 transition-opacity pointer-events-none z-50"></div>
    </div>

    <script>
        const jobTypes = ["Parkett verlegen", "Schleifen", "Laminat", "Vinyl", "Leisten", "Tepich", "Linoleum", "Andere Arbeit"];
        const unitTypes = ["m²", "m", "X"];

        window.onload = () => {
            updateLiveTime();
            setInterval(updateLiveTime, 1000);
            const now = new Date();
            document.getElementById('work-date').value = now.toISOString().split('T')[0];
            document.getElementById('work-time').value = now.toTimeString().slice(0,5);
            addJobRow();
            loadHistory();
        };

        function updateLiveTime() {
            const now = new Date();
            // Ndryshuar ne de-DE per formatin DD.MM.YYYY
            document.getElementById('live-clock').innerText = now.toLocaleString('de-DE');
        }

        function addJobRow() {
            const container = document.getElementById('job-list');
            const rowId = Date.now();
            const div = document.createElement('div');
            div.className = "p-4 bg-gray-50 rounded-xl border border-gray-200 relative";
            div.id = `row-${rowId}`;
            div.innerHTML = `
                <button onclick="removeRow(${rowId})" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">✕</button>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <select onchange="handleTypeChange(${rowId}, this.value)" class="job-type w-full p-2 rounded-lg border border-gray-300 text-sm">
                        ${jobTypes.map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                    <input type="text" placeholder="Zimmer..." class="job-room w-full p-2 rounded-lg border border-gray-300 text-sm">
                </div>
                <div id="custom-input-${rowId}" class="hidden mb-3">
                    <input type="text" placeholder="Beschreibung..." class="custom-name w-full p-2 rounded-lg border border-gray-300 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="flex gap-1">
                        <input type="number" step="0.01" id="amount-${rowId}" placeholder="Wert" class="job-amount w-full p-2 rounded-lg border border-gray-300 font-bold text-green-700 text-sm">
                        <select onchange="handleUnitChange(${rowId}, this.value)" class="job-unit p-2 rounded-lg border border-gray-300 bg-white text-xs font-bold">
                            ${unitTypes.map(u => `<option value="${u}">${u}</option>`).join('')}
                        </select>
                    </div>
                    <input type="text" placeholder="Notiz..." class="job-note w-full p-2 rounded-lg border border-gray-300 text-sm">
                </div>
            `;
            container.appendChild(div);
        }

        function handleUnitChange(rowId, unit) {
            const input = document.getElementById(`amount-${rowId}`);
            if (unit === 'X') {
                input.type = 'text';
                input.placeholder = '3.21 x 2.61';
            } else {
                input.type = 'number';
                input.placeholder = 'Wert';
            }
        }

        function handleTypeChange(id, value) {
            const customInput = document.getElementById(`custom-input-${id}`);
            if (value === "Andere Arbeit") customInput.classList.remove('hidden');
            else customInput.classList.add('hidden');
        }

        function removeRow(id) {
            if (document.querySelectorAll('.job-type').length > 1) document.getElementById(`row-${id}`).remove();
        }

        function getJobData() {
            const data = [];
            document.querySelectorAll('[id^="row-"]').forEach(row => {
                const rowId = row.id.split('-')[1];
                const type = row.querySelector('.job-type').value;
                const room = row.querySelector('.job-room').value;
                const amount = document.getElementById(`amount-${rowId}`).value;
                const unit = row.querySelector('.job-unit').value;
                if (amount) {
                    data.push({
                        puna: type === "Andere Arbeit" ? row.querySelector('.custom-name').value || type : type,
                        room: room || "-",
                        amount: amount,
                        unit: unit,
                        shenim: row.querySelector('.job-note').value || "-"
                    });
                }
            });
            return data;
        }

        function toggleHistory() {
            document.getElementById('main-form').classList.toggle('hidden');
            document.getElementById('history-section').classList.toggle('hidden');
            if (!document.getElementById('history-section').classList.contains('hidden')) loadHistory();
        }

        function saveToLocal() {
            const data = getJobData();
            if (data.length === 0) return showStatus("Bitte Daten eingeben!");
            const entry = {
                id: Date.now(),
                date: document.getElementById('work-date').value,
                time: document.getElementById('work-time').value,
                address: document.getElementById('project-address').value || "-",
                floor: document.getElementById('project-floor').value || "-",
                type: document.getElementById('project-type').value,
                worker: document.getElementById('worker-name').value || "-",
                data
            };
            let history = JSON.parse(localStorage.getItem('haliti_reports') || '[]');
            history.unshift(entry);
            localStorage.setItem('haliti_reports', JSON.stringify(history));
            showStatus("Gespeichert!");
        }

        function loadHistory() {
            const container = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('haliti_reports') || '[]');
            container.innerHTML = history.length ? history.map(entry => {
                // Formatimi i dates ne histori
                const d = entry.date.split('-');
                const formattedDate = `${d[2]}.${d[1]}.${d[0]}`;
                return `
                <div class="p-3 bg-gray-50 border rounded-xl flex justify-between items-center text-xs">
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold">${formattedDate} | ${entry.time}</div>
                        <div class="text-gray-500 truncate">${entry.address}</div>
                    </div>
                    <div class="flex gap-2 ml-2">
                        <button onclick='loadEntry(${JSON.stringify(entry).replace(/'/g, "&apos;")})' class="text-blue-600 font-bold uppercase">Laden</button>
                        <button onclick="deleteEntry(${entry.id})" class="text-red-500 font-bold">X</button>
                    </div>
                </div>
            `}).join('') : '<p class="text-center text-gray-400 py-4">Keine Daten</p>';
        }

        function loadEntry(entry) {
            document.getElementById('worker-name').value = entry.worker;
            document.getElementById('project-address').value = entry.address;
            document.getElementById('project-floor').value = entry.floor;
            document.getElementById('project-type').value = entry.type;
            document.getElementById('work-date').value = entry.date;
            document.getElementById('work-time').value = entry.time;
            const container = document.getElementById('job-list');
            container.innerHTML = '';
            entry.data.forEach(item => {
                addJobRow();
                const lastRow = container.lastElementChild;
                const rowId = lastRow.id.split('-')[1];
                lastRow.querySelector('.job-type').value = item.puna;
                lastRow.querySelector('.job-room').value = item.room;
                lastRow.querySelector('.job-unit').value = item.unit;
                handleUnitChange(rowId, item.unit);
                document.getElementById(`amount-${rowId}`).value = item.amount;
                lastRow.querySelector('.job-note').value = item.shenim;
            });
            toggleHistory();
        }

        function deleteEntry(id) {
            let history = JSON.parse(localStorage.getItem('haliti_reports') || '[]');
            localStorage.setItem('haliti_reports', JSON.stringify(history.filter(e => e.id !== id)));
            loadHistory();
        }

        function clearHistory() { if(confirm("Löschen?")) { localStorage.removeItem('haliti_reports'); loadHistory(); } }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.innerText = msg; el.style.opacity = "1";
            setTimeout(() => el.style.opacity = "0", 2000);
        }

        async function generatePDF(returnBlob = false) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const data = getJobData();
            if (!data.length) return;

            // Header Section
            doc.setFillColor(55, 65, 81); doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("PARKETT HALITI", 20, 25);
            
            doc.setFontSize(10);
            const rawDate = document.getElementById('work-date').value; // YYYY-MM-DD
            const d = rawDate.split('-');
            const formattedDate = `${d[2]}.${d[1]}.${d[0]}`; // Konvertuar ne DD.MM.YYYY
            
            const time = document.getElementById('work-time').value;
            const address = document.getElementById('project-address').value;
            const worker = document.getElementById('worker-name').value;
            const floor = document.getElementById('project-floor').value;
            const type = document.getElementById('project-type').value;

            doc.text(`Datum/Zeit: ${formattedDate} ${time}`, 190, 18, {align: 'right'});
            doc.text(`Etage/Typ: ${floor} (${type})`, 190, 26, {align: 'right'});
            doc.text(`Mitarbeiter: ${worker}`, 190, 34, {align: 'right'});

            doc.setTextColor(0, 0, 0); doc.setFontSize(11);
            doc.text(`Adresse: ${address}`, 20, 60);

            // Table Body
            const body = data.map(item => [
                item.puna, 
                item.room, 
                item.shenim, 
                item.unit === 'X' ? item.amount : `${item.amount} ${item.unit}`
            ]);

            doc.autoTable({
                startY: 70,
                head: [['Arbeitsart', 'Zimmer', 'Notiz', 'Gesamt']],
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [21, 128, 61], fontStyle: 'bold' },
                bodyStyles: { textColor: [0,0,0], fontStyle: 'bold' },
                columnStyles: { 3: { halign: 'right' } },
                didDrawCell: (data) => {
                    if (data.column.index === 0 && data.cell.section === 'body') {
                        const rowIndex = data.row.index;
                        if (rowIndex > 0 && body[rowIndex][0] === body[rowIndex - 1][0]) {
                            const { x, y, width } = data.cell;
                            doc.setDrawColor(255, 255, 255);
                            doc.setLineWidth(0.4);
                            doc.line(x + 0.5, y, x + width - 0.5, y);
                            doc.setDrawColor(0, 0, 0);
                        }
                    }
                }
            });

            if (returnBlob) return doc.output('blob');
            doc.save(`Bericht_${formattedDate}.pdf`);
        }

        async function sharePDF() {
            const blob = await generatePDF(true);
            if (!blob || !navigator.share) return;
            const file = new File([blob], "Arbeitsbericht.pdf", { type: "application/pdf" });
            navigator.share({ files: [file], title: "Arbeitsbericht" }).catch(console.error);
        }
    </script>
</body>
</html>
